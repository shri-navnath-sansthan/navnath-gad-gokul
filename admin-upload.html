<!DOCTYPE html>
<html lang="mr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>फोटो अपलोड</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<h2>📤 फोटो अपलोड करा</h2>

<form id="uploadForm">



<label>फोटो निवडा</label>
<input type="file" id="image" accept="image/*" multiple required>

<div id="captionContainer"></div>

<label>महिना</label>
<input type="text" id="month">

<label>वर्ष</label>
<input type="text" id="year">

<label>ॲडमिन पासवर्ड</label>
<input type="password" id="adminPassword" required>

<button type="submit" id="uploadBtn">Upload</button>

</form>

<!-- VIDEO -->

<h2>🎬 व्हिडिओ अपलोड करा</h2>

<form id="videoUploadForm">



<label>व्हिडिओ निवडा</label>
<input type="file" id="video" accept="video/*" multiple required>

<label>महिना</label>
<input type="text" id="videoMonth">

<label>वर्ष</label>
<input type="text" id="videoYear">

<label>ॲडमिन पासवर्ड</label>
<input type="password" id="videoPassword" required>

<button type="button" id="uploadVideoBtn">Upload Video</button>

</form>

<!-- Overlay -->
<div id="uploadOverlay" style="display:none;">
  <p id="progressText">Uploading 0%</p>
  <progress id="uploadProgress" value="0" max="100"></progress>
</div>

<h3>📸 Uploaded Photos</h3>
<div id="photo-list"></div>

<hr>

<h3>🎬 Uploaded Videos</h3>
<div id="video-list"></div>

<script src="js/admin-upload.js"></script>
<script src="js/video-upload.js"></script>

</body>
</html>
