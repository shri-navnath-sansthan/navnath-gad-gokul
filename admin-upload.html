<!DOCTYPE html>
<html lang="mr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>फोटो अपलोड</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<h2>📤 फोटो अपलोड करा</h2>

<form id="uploadForm">

<label>फोटो निवडा</label>
<input type="file" id="image" accept="image/*" required>

<label>Caption</label>
<input type="text" id="caption" placeholder="फोटो बद्दल लिहा">

<label>महिना</label>
<input type="text" id="month" placeholder="उदा. मार्च">

<label>वर्ष</label>
<input type="text" id="year" placeholder="उदा. 2026">

<button type="submit">Upload</button>

</form>

<script src="js/admin-upload.js"></script>

</body>
</html>
