<!DOCTYPE html>

<html lang="mr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>फोटो अपलोड</title>

<link rel="stylesheet" href="css/admin.css">

<script>

// Admin password
const password = prompt("Admin Password टाका");

if(password !== "shri"){
alert("❌ चुकीचा पासवर्ड ");
window.location.href="image.html";
}

</script>

</head>

<body>

<h2>📤 फोटो अपलोड करा</h2>

<form id="uploadForm">

<label>फोटो निवडा</label> <input type="file" id="image" accept="image/*" multiple required>

<div id="captionContainer"></div>

<label>महिना</label> <input type="text" id="month">

<label>वर्ष</label> <input type="text" id="year">

<button type="submit">Upload</button>

</form>

<!-- Progress bar -->

<div id="progressBox" style="display:none;margin-top:15px;">
<p>Uploading...</p>
<progress id="uploadProgress" value="0" max="100" style="width:100%;"></progress>
</div>

<script src="js/admin-upload.js"></script>

</body>
